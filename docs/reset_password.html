<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réinitialiser le mot de passe - BOOKED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #FBFAEF;
      color: #2F2F2F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      width: 100%;
      padding: 36px 28px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: #7E976B;
      font-size: 22px;
      margin: 0 0 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin: 0 0 28px;
    }

    /* ✅ inputs qui ne dépassent plus */
    input {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1.5px solid #e0e0e0;
      font-size: 15px;
      transition: border 0.2s;
      background: #FAFAFA;
    }

    input:focus {
      outline: none;
      border-color: #7E976B;
      background: white;
    }

    .btn {
      display: block;
      width: 100%;
      background-color: #7E976B;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
      letter-spacing: 0.5px;
      margin-top: 4px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* --- État chargement --- */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #7E976B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #7E976B;
      font-weight: 600;
      font-size: 15px;
    }

    /* --- État succès --- */
    .success-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 10px 0 20px;
      animation: fadeIn 0.4s ease;
    }

    .checkmark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: #eaf2e6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .success-title {
      color: #2e7d32;
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }

    .success-sub {
      color: #888;
      font-size: 14px;
      margin: 0;
    }

    .open-app-btn {
      display: block;
      width: 100%;
      background-color: #7E976B;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
      text-decoration: none;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .open-app-btn:hover {
      opacity: 0.9;
    }

    /* --- Erreur inline --- */
    .error-msg {
      color: #d32f2f;
      font-size: 13px;
      font-weight: 500;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fff0f0;
      border-radius: 10px;
      text-align: left;
    }

    .hidden { display: none; }
  </style>
</head>

<body>
  <div class="container">

    <!-- VUE FORMULAIRE -->
    <div id="view-form">
      <h1>Nouveau mot de passe 🔐</h1>
      <p class="subtitle">Choisissez un mot de passe sécurisé pour continuer sur <strong>BOOKED</strong></p>

      <input type="password" id="password" placeholder="Nouveau mot de passe" />
      <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" />

      <!-- ✅ Pas de onclick= ici -->
      <button class="btn" id="btn">Mettre à jour</button>

      <div id="error-msg"></div>
    </div>

    <!-- VUE CHARGEMENT -->
    <div id="view-loading" class="hidden">
      <div class="loading-state">
        <div class="spinner"></div>
        <p class="loading-text">Mise à jour en cours...</p>
      </div>
    </div>

    <!-- VUE SUCCÈS -->
    <div id="view-success" class="hidden">
      <div class="success-state">
        <div class="checkmark">✅</div>
        <p class="success-title">Mot de passe mis à jour !</p>
        <p class="success-sub">Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
        <!-- ✅ Lien deep link qui ouvre l'app -->
        <a class="open-app-btn" href="io.supabase.booked://login-callback">
          Retourner sur BOOKED
        </a>
      </div>
    </div>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      "https://YOUR_PROJECT.supabase.co",   // 🔁 Remplacer
      "YOUR_ANON_KEY"                        // 🔁 Remplacer
    )

    const btn       = document.getElementById("btn")
    const errorDiv  = document.getElementById("error-msg")

    const viewForm    = document.getElementById("view-form")
    const viewLoading = document.getElementById("view-loading")
    const viewSuccess = document.getElementById("view-success")

    function showView(name) {
      viewForm.classList.add("hidden")
      viewLoading.classList.add("hidden")
      viewSuccess.classList.add("hidden")
      document.getElementById("view-" + name).classList.remove("hidden")
    }

    // ✅ addEventListener dans le module = ça fonctionne
    btn.addEventListener("click", async () => {
      const password = document.getElementById("password").value
      const confirm  = document.getElementById("confirmPassword").value

      errorDiv.innerHTML = ""

      if (!password || !confirm) {
        errorDiv.innerHTML = '<div class="error-msg">Remplis tous les champs</div>'
        return
      }
      if (password.length < 6) {
        errorDiv.innerHTML = '<div class="error-msg">6 caractères minimum</div>'
        return
      }
      if (password !== confirm) {
        errorDiv.innerHTML = '<div class="error-msg">Les mots de passe ne correspondent pas</div>'
        return
      }

      showView("loading")

      const { error } = await supabase.auth.updateUser({ password })

      if (error) {
        showView("form")
        errorDiv.innerHTML = `<div class="error-msg">${error.message}</div>`
        return
      }

      showView("success")
    })
  </script>
</body>
</html>
