<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réinitialiser le mot de passe - BOOKED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #FBFAEF;
      color: #2F2F2F;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      max-width: 400px;
      width: 90%;
      padding: 30px 25px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: #7E976B;
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: border 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #7E976B;
    }

    .btn {
      width: 100%;
      background-color: #7E976B;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: opacity 0.2s;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .success {
      color: #2e7d32;
      font-weight: 600;
      margin-top: 15px;
    }

    .error {
      color: #d32f2f;
      font-weight: 500;
      margin-top: 15px;
    }

    .link {
      margin-top: 20px;
      display: block;
      font-size: 14px;
      color: #7E976B;
      text-decoration: underline;
    }

    .small {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Nouveau mot de passe 🔐</h1>

    <p>
      Choisissez un mot de passe sécurisé pour continuer sur <strong>BOOKED</strong>
    </p>

    <input type="password" id="password" placeholder="Nouveau mot de passe" />
    <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" />

    <button class="btn" id="btn" onclick="updatePassword()">
      Mettre à jour
    </button>

    <div id="message"></div>

    <a class="link" href="io.supabase.booked://login-callback">
      Retour à l'application
    </a>

    <p class="small">
      Si le bouton ne fonctionne pas, ouvrez BOOKED manuellement.
    </p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      "https://YOUR_PROJECT.supabase.co",
      "YOUR_ANON_KEY"
    )

    const btn = document.getElementById("btn")
    const message = document.getElementById("message")

    async function updatePassword() {
      const password = document.getElementById("password").value
      const confirm = document.getElementById("confirmPassword").value

      message.innerHTML = ""

      if (!password || !confirm) {
        message.innerHTML = '<div class="error">Remplis tous les champs</div>'
        return
      }

      if (password.length < 6) {
        message.innerHTML = '<div class="error">6 caractères minimum</div>'
        return
      }

      if (password !== confirm) {
        message.innerHTML = '<div class="error">Les mots de passe ne correspondent pas</div>'
        return
      }

      btn.disabled = true
      btn.innerText = "Mise à jour..."

      const { error } = await supabase.auth.updateUser({
        password: password
      })

      if (error) {
        message.innerHTML = `<div class="error">${error.message}</div>`
        btn.disabled = false
        btn.innerText = "Mettre à jour"
        return
      }

      message.innerHTML = '<div class="success">Mot de passe mis à jour 🎉</div>'

      setTimeout(() => {
        window.location.href = "io.supabase.booked://login-callback"
      }, 1500)
    }
  </script>

</body>
</html>
